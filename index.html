<body>
  <div id="app">
    <header id="header">
      <h1 id="site-title">实录</h1>

        <a href="all-events.html" class="nav-link" title="全站事件列表">📋</a>

        <button id="shortcut-btn" class="icon-btn" title="键盘快捷键">⌨</button>
      </div>
    </header>

    <div id="search-panel" class="hidden">
      <div id="search-input-wrap">
        <span id="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="搜索事件标题、地区、描述（至少2个汉字）" autocomplete="off">
        <button id="search-clear" class="icon-btn" title="清除">✕</button>
      </div>
      <div id="search-results"></div>
      <div id="search-status"></div>
    </div>

    <div id="timeline-area">
      <div id="dynasty-timeline-container">
        <canvas id="dynasty-canvas"></canvas>
        <div id="dynasty-tooltip" class="tooltip hidden"></div>
      </div>

      <div id="calendar-timeline-container">
        <canvas id="calendar-canvas"></canvas>
        <div id="calendar-tooltip" class="tooltip hidden"></div>
      </div>
    </div>

    <div id="mobile-year-nav">
      <button class="mob-nav-btn" data-step="-10">«</button>
      <button class="mob-nav-btn" data-step="-1">‹</button>

      <button class="mob-nav-btn" data-step="1">›</button>
      <button class="mob-nav-btn" data-step="10">»</button>
    </div>

    <div id="map-and-events">
      <div id="map-area">
        <div id="map-container">
          <div id="map"></div>
          <div id="map-empty-hint" class="hidden">该年份暂无记录事件</div>
          <div id="map-layer-toggle">
            <button id="layer-satellite" class="layer-btn active">卫星图</button>
            <button id="layer-street" class="layer-btn">街道图</button>
          </div>
        </div>

        <div id="event-detail-panel" class="hidden">
          <div id="event-detail-header">
            <h3 id="event-detail-title"></h3>
            <button id="event-detail-close" class="icon-btn">✕</button>
          </div>
          <div id="event-detail-body">
            <span id="event-detail-category"></span>
            <span id="event-detail-continent"></span>
            <span id="event-detail-region"></span>
            <p id="event-detail-description"></p>
          </div>
        </div>
      </div>

      <div id="event-list-panel">
        <div id="event-list-body"></div>
      </div>
    </div>
